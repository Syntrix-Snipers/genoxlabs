<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#800080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Abstract DNA/Orbit rings -->
  <g transform="translate(10, 10)" filter="url(#glow)">
    <!-- Outer ellipse ring -->
    <ellipse cx="40" cy="40" rx="35" ry="15" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5" opacity="0.9"/>
    <!-- Tilted ring -->
    <ellipse cx="40" cy="40" rx="35" ry="15" fill="none" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6" transform="rotate(60, 40, 40)"/>
    <!-- Second tilted ring -->
    <ellipse cx="40" cy="40" rx="35" ry="15" fill="none" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.6" transform="rotate(-60, 40, 40)"/>
    <!-- Center dot -->
    <circle cx="40" cy="40" r="6" fill="url(#purpleGrad)" opacity="1"/>
    <!-- Orbit dot 1 -->
    <circle cx="75" cy="40" r="3.5" fill="#bf00ff" opacity="0.9"/>
    <!-- Orbit dot 2 -->
    <circle cx="5" cy="40" r="3.5" fill="#800080" opacity="0.9"/>
    <!-- Orbit dot 3 top -->
    <circle cx="40" cy="5" r="3" fill="#bf00ff" opacity="0.8"/>
    <!-- Orbit dot 4 bottom -->
    <circle cx="40" cy="75" r="3" fill="#800080" opacity="0.8"/>
  </g>

  <!-- Wordmark: GenoxLabs -->
  <text x="100" y="58" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="36" font-weight="800" letter-spacing="1" fill="url(#purpleGrad)" filter="url(#glow)">Genox</text>
  <text x="226" y="58" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="36" font-weight="800" letter-spacing="1" fill="#ffffff">Labs</text>

  <!-- Tagline -->
  <text x="100" y="76" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="10" font-weight="400" letter-spacing="4" fill="#800080" opacity="0.8">NEXT LEVEL INNOVATION</text>
</svg>
